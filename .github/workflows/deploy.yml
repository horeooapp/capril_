name: 🚀 Deploy QAPRIL v3.0 to Hostinger

on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: Quality Gate (Build + Type Check)
  # ──────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🔨 Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_RESEND_KEY: ${{ secrets.AUTH_RESEND_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER }}
          # Mobile Money & Payments
          MOBILE_MONEY_WEBHOOK_SECRET: ${{ secrets.MOBILE_MONEY_WEBHOOK_SECRET }}
          ORANGE_MONEY_API_KEY: ${{ secrets.ORANGE_MONEY_API_KEY }}
          MTN_MOMO_API_KEY: ${{ secrets.MTN_MOMO_API_KEY }}
          MOOV_MONEY_API_KEY: ${{ secrets.MOOV_MONEY_API_KEY }}
          # MaPoste
          MAPOSTE_WEBHOOK_SECRET: ${{ secrets.MAPOSTE_WEBHOOK_SECRET }}
          MAPOSTE_API_KEY: ${{ secrets.MAPOSTE_API_KEY }}
          # SMS Gateway
          SMS_GATEWAY_PROVIDER: ${{ vars.SMS_GATEWAY_PROVIDER }}
          SMS_API_KEY: ${{ secrets.SMS_API_KEY }}
          # USSD
          USSD_SHARED_SECRET: ${{ secrets.USSD_SHARED_SECRET }}
          # App
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}

      - name: 💾 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/standalone
            .next/static
            public
            prisma
            server.js
            package.json
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # JOB 2: Deploy to Hostinger
  # ──────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📂 Sync files (FTP)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ vars.DEPLOY_PATH }}/
          exclude: |
            **/.git*
            **/.git*/**
            .env*
            .github/**

      - name: ⚠️ WARNING - Manual Restart Required
        run: |
          echo "======================================================================"
          echo "🚨 SSH is completely blocked by Hostinger Firewall for Github Actions."
          echo "🚨 Prisma Migrations and PM2 Restart CANNOT be automated via SSH."
          echo "======================================================================"
          echo "Please log into Hostinger Terminal manually and run:"
          echo "cd ${{ vars.DEPLOY_PATH }}"
          echo "npx prisma migrate deploy"
          echo "npx prisma generate"
          echo "pm2 restart capril || pm2 start server.js --name capril --env production"

      - name: 🩺 Health Check (Ping)
        run: |
          echo "Waiting 5s for any auto-restarts to take effect..."
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.NEXT_PUBLIC_APP_URL }}/api/health || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Health check returned $STATUS. Note: You may need to manually restart PM2 as detailed above!"
          else
            echo "✅ Application is responding!"
          fi

      - name: 📣 Notify on Success
        if: success()
        run: |
          echo "🎉 QAPRIL v3.0 deployed successfully to production"
          echo "URL: ${{ vars.NEXT_PUBLIC_APP_URL }}"

      - name: 🔴 Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above."
