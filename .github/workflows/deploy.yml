name: 🚀 Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 🔨 Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_RESEND_KEY: ${{ secrets.AUTH_RESEND_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER }}

      - name: 🗝️ Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: 📂 Sync files (Rsync)
        run: |
          # On synchronise le wrapper server.js, le dossier standalone (renommé), les assets statiques et prisma
          # Hostinger a besoin du dossier .next/standalone complet pour fonctionner
          rsync -avz --delete \
            server.js \
            package.json \
            prisma \
            public \
            .next/static \
            .next/standalone/ \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:${{ vars.DEPLOY_PATH }}

      - name: 🚀 Restart Application
        run: |
          ssh ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} "
            cd ${{ vars.DEPLOY_PATH }} &&
            # Pas besoin de npm install complet car standalone contient les node_modules nécessaires
            # mais on s'assure que prisma est prêt
            npx prisma generate &&
            pm2 restart capril || pm2 start server.js --name capril
          "

