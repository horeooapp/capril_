name: 🚀 Deploy QAPRIL v3.0 to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: Quality Gate (Build + Type Check)
  # ──────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🔨 Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_RESEND_KEY: ${{ secrets.AUTH_RESEND_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER }}
          # Mobile Money & Payments
          MOBILE_MONEY_WEBHOOK_SECRET: ${{ secrets.MOBILE_MONEY_WEBHOOK_SECRET }}
          ORANGE_MONEY_API_KEY: ${{ secrets.ORANGE_MONEY_API_KEY }}
          MTN_MOMO_API_KEY: ${{ secrets.MTN_MOMO_API_KEY }}
          MOOV_MONEY_API_KEY: ${{ secrets.MOOV_MONEY_API_KEY }}
          # MaPoste
          MAPOSTE_WEBHOOK_SECRET: ${{ secrets.MAPOSTE_WEBHOOK_SECRET }}
          MAPOSTE_API_KEY: ${{ secrets.MAPOSTE_API_KEY }}
          # SMS Gateway
          SMS_GATEWAY_PROVIDER: ${{ vars.SMS_GATEWAY_PROVIDER }}
          SMS_API_KEY: ${{ secrets.SMS_API_KEY }}
          # USSD
          USSD_SHARED_SECRET: ${{ secrets.USSD_SHARED_SECRET }}
          # App
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}

      - name: 💾 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/standalone
            .next/static
            public
            prisma
            server.js
            package.json
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # JOB 2: Deploy to Hostinger
  # ──────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Hostinger
    runs-on: self-hosted
    needs: build
    environment: production

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📂 Deploy files locally
        run: |
          DEPLOY_DEST="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_DEST" ]; then DEPLOY_DEST="/home/github/capril_app"; fi
          # Créer le répertoire s'il n'existe pas
          mkdir -p $DEPLOY_DEST
          # Synchronisation locale
          rsync -avz --exclude='.env*' \
            --exclude='node_modules' \
            --exclude='.*' \
            server.js package.json prisma public .next/static .next/standalone/ \
            $DEPLOY_DEST/

      - name: 🗃️ Run Prisma Migrations
        run: |
          DEPLOY_DEST="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_DEST" ]; then DEPLOY_DEST="/home/github/capril_app"; fi
          cd $DEPLOY_DEST
          export DATABASE_URL='${{ secrets.DATABASE_URL }}'
          npx prisma migrate deploy

      - name: 🚀 Restart Application (PM2)
        run: |
          DEPLOY_DEST="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_DEST" ]; then DEPLOY_DEST="/home/github/capril_app"; fi
          cd $DEPLOY_DEST
          npx prisma generate
          # Démarrer avec sudo pour forcer le runtime s'il utilise un autre user
          sudo pm2 restart capril || sudo pm2 start server.js --name capril --env production

      - name: 🩺 Health Check
        run: |
          echo "Waiting for app to start..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.NEXT_PUBLIC_APP_URL }}/api/health || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed! Triggering PM2 rollback..."
            sudo pm2 restart capril
            exit 1
          fi
          echo "✅ Application is healthy!"

      - name: 📣 Notify on Success
        if: success()
        run: |
          echo "🎉 QAPRIL v3.0 deployed successfully to production"
          echo "URL: ${{ vars.NEXT_PUBLIC_APP_URL }}"

      - name: 🔴 Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above."
