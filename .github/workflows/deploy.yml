name: 🚀 Deploy QAPRIL v3.0 to Hostinger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: Quality Gate (Build + Type Check)
  # ──────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🔨 Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_RESEND_KEY: ${{ secrets.AUTH_RESEND_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER }}
          # Mobile Money & Payments
          MOBILE_MONEY_WEBHOOK_SECRET: ${{ secrets.MOBILE_MONEY_WEBHOOK_SECRET }}
          ORANGE_MONEY_API_KEY: ${{ secrets.ORANGE_MONEY_API_KEY }}
          MTN_MOMO_API_KEY: ${{ secrets.MTN_MOMO_API_KEY }}
          MOOV_MONEY_API_KEY: ${{ secrets.MOOV_MONEY_API_KEY }}
          # MaPoste
          MAPOSTE_WEBHOOK_SECRET: ${{ secrets.MAPOSTE_WEBHOOK_SECRET }}
          MAPOSTE_API_KEY: ${{ secrets.MAPOSTE_API_KEY }}
          # SMS Gateway
          SMS_GATEWAY_PROVIDER: ${{ vars.SMS_GATEWAY_PROVIDER }}
          SMS_API_KEY: ${{ secrets.SMS_API_KEY }}
          # USSD
          USSD_SHARED_SECRET: ${{ secrets.USSD_SHARED_SECRET }}
          # App
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}

      - name: 💾 Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .next
            public
            prisma
            package.json
            package-lock.json
            next.config.ts
            next-env.d.ts
            tsconfig.json
            postcss.config.mjs
            tailwind.config.ts
            src
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # JOB 2: Deploy to Hostinger
  # ──────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Hostinger
    runs-on: self-hosted
    needs: build
    environment: production

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build-output

      - name: 🟢 Setup Node.js (Runner Env)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 🚀 Transfer Files to VPS
        run: |
          DEPLOY_DEST="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_DEST" ]; then DEPLOY_DEST="/home/github/capril_app"; fi
          sudo mkdir -p $DEPLOY_DEST
          sudo chown -R github:github $DEPLOY_DEST || sudo chown -R $USER:$USER $DEPLOY_DEST
          
          # Sync the full Next.js project to the destination
          # Use flags to ignore owner/group/perms from the build env
          rsync -rlptvz --no-owner --no-group --no-perms \
            --exclude='.env*' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            ./ $DEPLOY_DEST/

      # Handled inside the restart block for better permission consistency

      - name: 🔐 Create Production .env
        run: |
          DEPLOY_DEST="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_DEST" ]; then DEPLOY_DEST="/home/github/capril_app"; fi
          cd $DEPLOY_DEST
          echo "DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"" > .env
          echo "AUTH_SECRET=\"${{ secrets.AUTH_SECRET }}\"" >> .env
          echo "NEXTAUTH_SECRET=\"${{ secrets.AUTH_SECRET }}\"" >> .env
          echo "AUTH_URL=\"${{ secrets.AUTH_URL }}\"" >> .env
          echo "NEXTAUTH_URL=\"${{ secrets.NEXTAUTH_URL }}\"" >> .env
          echo "NEXTAUTH_URL_INTERNAL=\"http://127.0.0.1:3000\"" >> .env
          echo "AUTH_TRUST_HOST=\"true\"" >> .env
          echo "AUTH_RESEND_KEY=\"${{ secrets.AUTH_RESEND_KEY }}\"" >> .env
          echo "EMAIL_FROM=\"${{ vars.EMAIL_FROM }}\"" >> .env
          echo "EMAIL_SERVER=\"${{ secrets.EMAIL_SERVER }}\"" >> .env
          echo "JWT_PRIVATE_KEY=\"${{ secrets.JWT_PRIVATE_KEY }}\"" >> .env
          echo "JWT_PUBLIC_KEY=\"${{ secrets.JWT_PUBLIC_KEY }}\"" >> .env
          echo "MOBILE_MONEY_WEBHOOK_SECRET=\"${{ secrets.MOBILE_MONEY_WEBHOOK_SECRET }}\"" >> .env
          echo "ORANGE_MONEY_API_KEY=\"${{ secrets.ORANGE_MONEY_API_KEY }}\"" >> .env
          echo "MTN_MOMO_API_KEY=\"${{ secrets.MTN_MOMO_API_KEY }}\"" >> .env
          echo "MOOV_MONEY_API_KEY=\"${{ secrets.MOOV_MONEY_API_KEY }}\"" >> .env
          echo "WAVE_API_KEY=\"${{ secrets.WAVE_API_KEY }}\"" >> .env
          echo "MAPOSTE_WEBHOOK_SECRET=\"${{ secrets.MAPOSTE_WEBHOOK_SECRET }}\"" >> .env
          echo "MAPOSTE_API_KEY=\"${{ secrets.MAPOSTE_API_KEY }}\"" >> .env
          echo "SMS_GATEWAY_PROVIDER=\"${{ vars.SMS_GATEWAY_PROVIDER }}\"" >> .env
          echo "SMS_API_KEY=\"${{ secrets.SMS_API_KEY }}\"" >> .env
          echo "SMS_SENDER_NAME=\"${{ vars.SMS_SENDER_NAME }}\"" >> .env
          echo "USSD_SHARED_SECRET=\"${{ secrets.USSD_SHARED_SECRET }}\"" >> .env
          echo "NEXT_PUBLIC_APP_URL=\"${{ vars.NEXT_PUBLIC_APP_URL }}\"" >> .env
          echo "OTP_TTL_SECONDS=\"${{ vars.OTP_TTL_SECONDS || 600 }}\"" >> .env
          echo "REDIS_URL=\"redis://127.0.0.1:6379\"" >> .env
          echo "ENABLE_REDIS_MOCK=\"false\"" >> .env
          echo "NODE_ENV=\"production\"" >> .env

      - name: 📦 Install and Start Local Redis
        run: |
          sudo apt-get update || true
          sudo apt-get install -y redis-server
          sudo systemctl enable redis-server || true
          sudo systemctl start redis-server || true

      - name: 🚀 Restart Application (PM2)
        run: |
          DEPLOY_DEST="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_DEST" ]; then DEPLOY_DEST="/home/github/capril_app"; fi
          
          # 0. Fix permissions for npm and pm2 (Critical for self-hosted runners)
          sudo chown -R $USER:$USER ~/.npm || true
          sudo chown -R $USER:$USER ~/.pm2 || true

          # 1. Cleanup root instances if any (Part 3.1)
          sudo HOME=/root pm2 kill || true
          
          # 2. Secure Deployment Execution
          # We use su - github -c to ensure all commands run in a clean environment as the github user.
          # We use -H 0.0.0.0 to listen on all interfaces, allowing external access.
          sudo su - github -c "
            cd $DEPLOY_DEST && \
            export DATABASE_URL='${{ secrets.DATABASE_URL }}' && \
            npm ci --omit=dev && \
            # FIX: Automated cleanup of invalid JSONB defaults in migration files
            # We use a standalone script to avoid shell quoting issues and find {} substitution errors
            bash scripts/fix-migrations.sh || true && \
            npx prisma@6.4.1 migrate resolve --rolled-back \"20260322172550_init\" || true && \
            npx prisma@6.4.1 migrate deploy && \
            npx prisma@6.4.1 generate && \
            (pm2 reload capril --update-env || \
             pm2 start node_modules/next/dist/bin/next --name capril --cwd $DEPLOY_DEST --interpreter $(which node) --env production -- start -p 3000 -H 0.0.0.0) && \
            pm2 save
          "

      - name: 🩺 Health Check
        run: |
          echo "Waiting for app to start..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3000/api/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed! Showing PM2 logs:"
            pm2 logs capril --lines 60 --nostream
            echo "Triggering PM2 rollback..."
            pm2 restart capril
            exit 1
          fi
          echo "✅ Application is healthy!"

      - name: 📣 Notify on Success
        if: success()
        run: |
          echo "🎉 QAPRIL v3.0 deployed successfully to production"
          echo "URL: ${{ vars.NEXT_PUBLIC_APP_URL }}"

      - name: 🔴 Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above."
